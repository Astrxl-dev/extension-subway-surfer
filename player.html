<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Player</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --accent: #209cee;
            --border: #334155;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        .header {
            padding: 12px 16px; background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; -webkit-app-region: drag;
        }
        .live-indicator { display: flex; align-items: center; gap: 6px; color: var(--accent); font-size: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }
        #player-container { flex: 1; background: #000; position: relative; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls {
            padding: 15px 20px; background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
        }
        .volume-icon { opacity: 0.7; font-size: 16px; cursor: pointer; }
        input[type=range] { flex: 1; appearance: none; -webkit-appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent); margin-top: -5px; box-shadow: 0 0 10px rgba(32, 156, 238, 0.4); transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .volume-value { font-size: 12px; font-weight: 700; min-width: 35px; text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <span>SoundCloud Player</span>
        <div class="live-indicator"><div class="dot"></div><span>ONLINE</span></div>
    </div>
    <div id="player-container">
        </div>
    <div class="controls">
        <div class="volume-icon" id="muteBtn">🔊</div>
        <input type="range" id="volumeSlider" min="0" max="100" value="100">
        <div class="volume-value" id="volumeText">100%</div>
    </div>
    <script src="player.js"></script>
</body>
</html>
